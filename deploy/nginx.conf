server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/racing-game/client/dist;
    index index.html;

    # Socket.IO — proxy to Node.js server
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Keep the connection alive for WebSocket long-polling fallback
        proxy_read_timeout  86400;
    }

    # Static assets — long cache for hashed filenames (Vite default)
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|glb|gltf|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA catch-all — redirect everything else to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
